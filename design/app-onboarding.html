<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#004795" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Cocos Parking — Perfil</title>
    <link rel="stylesheet" href="shared.css" />
    <link rel="stylesheet" href="parking-ui.css" />
  </head>
  <body>
    <div class="device-stage">
      <div class="device-frame">
        <div class="device-notch"></div>
        <div class="app">
          <header class="parking-header">
            <div class="parking-header__bar">
              <div class="avatar">?</div>
              <div class="parking-header__logo-wrap">
                <img src="cocos-logo.png" alt="Cocos" class="parking-header__logo" />
              </div>
              <button type="button" class="icon-btn" aria-label="Cerrar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
              </button>
            </div>
            <h1 class="parking-header__heading">Completá tu perfil</h1>
            <p class="parking-header__sub">Un paso más antes de reservar</p>
          </header>

          <main class="parking-body">
            <section class="info-card">
              <div class="info-card__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div>
                <div class="info-card__label">Tu identificación</div>
                <div class="info-card__value">Nombre y patente</div>
                <div class="info-card__sub">Así te mostramos cuando ocupás una cochera</div>
              </div>
            </section>

            <div class="field">
              <label for="name">Nombre completo</label>
              <input id="name" type="text" placeholder="Ej: Gonza G" />
            </div>

            <div class="field">
              <label for="plate">Patente</label>
              <input id="plate" type="text" placeholder="Ej: IOY468" />
              <p class="field__hint">Podés agregar más patentes si tenés más de un auto</p>
            </div>

            <div class="chips">
              <span class="chip">
                IOY468
                <button type="button" aria-label="Quitar">&times;</button>
              </span>
            </div>

            <button type="button" class="btn btn--cocos" style="margin-top: 8px">Continuar</button>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
